<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ring vs Tree All-Reduce Comparison</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #ffffff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #1a1a1a; padding: 2rem; }
.summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 2rem; }
.card { background: #f5f5f5; border-radius: 8px; padding: 1rem; }
.card-label { font-size: 13px; color: #666; }
.card-value { font-size: 24px; font-weight: 500; color: #1a1a1a; }
.chart-section { margin-bottom: 2.5rem; }
.legend { display: flex; gap: 16px; margin-bottom: 8px; font-size: 12px; color: #666; align-items: center; }
.legend-dot { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }
.chart-wrap { position: relative; width: 100%; height: 340px; }
</style>
</head>
<body>
<div class="summary">
  <div class="card"><div class="card-label">Ranks</div><div class="card-value">16</div></div>
  <div class="card"><div class="card-label">Gradient sizes</div><div class="card-value">100 KiB – 6 MiB</div></div>
  <div class="card"><div class="card-label">Ring peak throughput</div><div class="card-value">9.14 MiB/s</div></div>
  <div class="card"><div class="card-label">Tree peak throughput</div><div class="card-value">2.34 MiB/s</div></div>
</div>
<div class="chart-section">
  <div class="legend">
    <span style="display:flex;align-items:center;gap:4px;"><span class="legend-dot" style="background:#1D9E75;"></span>Ring throughput (MiB/s)</span>
    <span style="display:flex;align-items:center;gap:4px;"><span class="legend-dot" style="background:#D85A30;"></span>Tree throughput (MiB/s)</span>
  </div>
  <div class="chart-wrap"><canvas id="throughputChart"></canvas></div>
</div>
<div class="chart-section">
  <div class="legend">
    <span style="display:flex;align-items:center;gap:4px;"><span class="legend-dot" style="background:#534AB7;"></span>Ring latency (ms)</span>
    <span style="display:flex;align-items:center;gap:4px;"><span class="legend-dot" style="background:#D4537E;"></span>Tree latency (ms)</span>
  </div>
  <div class="chart-wrap"><canvas id="latencyChart"></canvas></div>
</div>
<script>
const labels = ['100 KiB', '500 KiB', '1 MiB', '2 MiB', '4 MiB', '6 MiB'];
const ringTp = [0.691, 4.007, 4.225, 5.735, 7.998, 9.137];
const treeTp = [2.338, 2.143, 2.076, 2.032, 2.043, 2.087];
const ringLat = [141.32, 121.85600000000001, 236.7, 348.757, 500.129, 656.6659999999999];
const treeLat = [41.769, 227.83100000000002, 481.634, 984.158, 1957.813, 2874.7400000000002];
const gridColor = 'rgba(0,0,0,0.06)';
const tickColor = 'rgba(0,0,0,0.45)';
const commonOptions = {
  responsive: true, maintainAspectRatio: false,
  plugins: { legend: { display: false } },
  scales: {
    x: { grid: { display: false }, ticks: { color: tickColor, font: { size: 13 }, autoSkip: false, maxRotation: 45 }, border: { display: false } },
    y: { grid: { color: gridColor }, ticks: { color: tickColor, font: { size: 12 } }, border: { display: false } }
  }
};
new Chart(document.getElementById('throughputChart'), {
  type: 'bar',
  data: { labels, datasets: [
    { label: 'Ring', data: ringTp, backgroundColor: '#1D9E75', borderRadius: 6, barPercentage: 0.8, categoryPercentage: 0.7 },
    { label: 'Tree', data: treeTp, backgroundColor: '#D85A30', borderRadius: 6, barPercentage: 0.8, categoryPercentage: 0.7 }
  ] },
  options: { ...commonOptions, scales: { ...commonOptions.scales, y: { ...commonOptions.scales.y, beginAtZero: true, ticks: { ...commonOptions.scales.y.ticks, callback: v => v.toFixed(1) } } },
    plugins: { ...commonOptions.plugins, tooltip: { callbacks: { label: ctx => ctx.dataset.label + ': ' + ctx.parsed.y.toFixed(3) + ' MiB/s' } } } }
});
new Chart(document.getElementById('latencyChart'), {
  type: 'bar',
  data: { labels, datasets: [
    { label: 'Ring', data: ringLat, backgroundColor: '#534AB7', borderRadius: 6, barPercentage: 0.8, categoryPercentage: 0.7 },
    { label: 'Tree', data: treeLat, backgroundColor: '#D4537E', borderRadius: 6, barPercentage: 0.8, categoryPercentage: 0.7 }
  ] },
  options: { ...commonOptions, scales: { ...commonOptions.scales, y: { ...commonOptions.scales.y, beginAtZero: true, ticks: { ...commonOptions.scales.y.ticks, callback: v => Math.round(v) + ' ms' } } },
    plugins: { ...commonOptions.plugins, tooltip: { callbacks: { label: ctx => ctx.dataset.label + ': ' + ctx.parsed.y.toFixed(1) + ' ms' } } } }
});
</script>
</body>
</html>
